name: Deploy AVALON to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js for validation
        uses: actions/setup-node@v4
        with:
          node-version: 22.22.2

      - name: Validate code
        run: |
          cd server
          node -c index.js
          echo "✅ Code syntax validation passed"

      - name: Deploy to server and build
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment process..."
            
            # 1. Navigate to code repository
            cd /home/lighthouse/AVALON/AVALON
            
            # 2. Pull latest code
            echo "📥 Pulling latest code..."
            git pull origin main
            
            # 3. Install/update dependencies
            echo "📦 Installing dependencies..."
            cd server
            sudo npm install
            
            # 4. Install pkg globally if not present
            echo "🔧 Installing pkg..."
            sudo npm install -g pkg
            
            # 5. Build binary with Node.js 22.22.2
            echo "⚙️ Building binary with Node.js 22.22.2..."
            sudo pkg index.js -t node22-linux-x64 -o /home/lighthouse/AVALON/
            
            # 6. Make binary executable
            echo "🔧 Setting executable permissions..."
            cd /home/lighthouse/AVALON
            chmod +x server-app
            
            # 7. Install PM2 if not present
            echo "📦 Installing PM2..."
            sudo npm install -g pm2
            
            # 8. Restart or start service
            echo "🔄 Restarting/Starting service..."
            if pm2 status | grep -q "avalon"; then
              echo "🔄 Restarting existing avalon service..."
              pm2 restart avalon
            else
              echo "🚀 Starting new avalon service..."
              pm2 start ./server-app --name "avalon"
            fi
            
            # 9. Save PM2 configuration
            echo "💾 Saving PM2 configuration..."
            pm2 save
            
            # 10. Show service status
            echo "📊 Service status:"
            pm2 status avalon
            
            echo "✅ Deployment completed successfully!"