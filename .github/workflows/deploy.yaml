name: Deploy AVALON to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js for validation
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.2

      - name: Validate code
        run: |
          cd server
          node -c index.js
          echo "✅ Code syntax validation passed"

      - name: Deploy to server and build
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment process..."
            
            # 1. Navigate to code repository
            cd /home/lighthouse/AVALON/AVALON
            
            # 2. Pull latest code
            echo "📥 Pulling latest code..."
            git pull origin main
            
            # 激活NVM环境
            echo "🔧 激活NVM环境..."
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 3. Install/update dependencies
            echo "📦 Installing dependencies..."
            cd server
            sudo npm install
            
            # 4. Install PM2 if not present
            echo "📦 Installing PM2..."
            npm install -g pm2
            
            # 5. Restart or start service with env file parameter
            echo "🔄 Restarting/Starting service..."
            if pm2 status | grep -q "avalon-server"; then
              echo "🔄 Restarting existing avalon-server service..."
              pm2 restart avalon-server
            else
              echo "🚀 Starting new avalon-server service with env file..."
              pm2 start index.js --name "avalon-server" -- --env /home/lighthouse/AVALON/.env
            fi
            
            # 6. Save PM2 configuration
            echo "💾 Saving PM2 configuration..."
            pm2 save
            
            # 7. Show service status
            echo "📊 Service status:"
            pm2 status avalon-server
            
            echo "✅ Deployment completed successfully!"