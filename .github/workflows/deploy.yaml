name: Build & Deploy to AVALON

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: server/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('server/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: cd server && npm install

      - name: Install pkg
        run: npm install -g pkg

      # 修复这里：node18 而不是 node20
      - name: Build Linux binary
        run: cd server && pkg index.js -t node18-linux-x64 -o ../server-app

      - name: Verify binary
        run: ls -la server-app && file server-app

      - name: Upload binary to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: server-app
          target: /home/AVALON
          overwrite: true

      - name: Restart app with PM2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/AVALON
            chmod +x server-app
            npm install -g pm2
            pm2 restart node-backend || pm2 start ./server-app --name "node-backend"
            pm2 save